name: Build and Deploy

on:
  repository_dispatch:
    types: [release-created]

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.client_payload.commit_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: repo-name
        name: Fix repository lowercase name
        uses: Entepotenz/change-string-case-action-min-dependencies@v1
        with:
          string: ${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo-name.outputs.lowercase }}:latest
            ghcr.io/${{ steps.repo-name.outputs.lowercase }}:${{ github.event.client_payload.version }}

  deploy:
    name: Deploy to k8s
    needs: build-and-push-image
    runs-on: [self-hosted, k8s]
    steps:
      - name: Restart deployment
        run: |
          RESTART_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          curl -sf -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/strategic-merge-patch+json" \
            --cacert "$CA" \
            "https://kubernetes.default.svc/apis/apps/v1/namespaces/generate-playlist/deployments/generate-playlist" \
            -d "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$RESTART_AT\"}}}}}"
