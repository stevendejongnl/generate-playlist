<div class="list-item" id="playlist-{{ item.id }}">
    <div class="list-item-info">
        <div class="list-item-title">{{ item.playlist_name or item.spotify_playlist_id }}</div>
        <div class="list-item-subtitle">
            {% if item.track_count is defined and item.track_count is not none %}{{ item.track_count }} tracks &middot; {% endif %}
            <span class="text-dim">{{ item.spotify_playlist_id }}</span>
        </div>
    </div>
    <div class="list-item-actions">
        <button class="btn btn-danger btn-ghost"
                hx-delete="{{ delete_url }}"
                hx-target="#playlist-{{ item.id }}"
                hx-swap="outerHTML"
                data-confirm="Remove this playlist?">
            &times;
        </button>
    </div>
</div>
